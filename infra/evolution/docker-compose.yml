services:
  postgres:
    image: postgres:15-alpine
    container_name: desklabs-evolution-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    volumes:
      - evolution_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: desklabs-evolution-redis
    restart: unless-stopped
    volumes:
      - evolution_redis:/data

  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: desklabs-evolution-api
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    environment:
      AUTHENTICATION_API_KEY: desklabs-local-key
      SERVER_URL: http://localhost:8080
      CORS_ORIGIN: "*"

      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution@postgres:5432/evolution

      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/0

    volumes:
      - evolution_instances:/evolution/instances

volumes:
  evolution_instances:
  evolution_postgres:
  evolution_redis: